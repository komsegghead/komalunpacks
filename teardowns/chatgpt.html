<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teardown | Komal Unpacks</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #FFFDF8;
      --sunshine: #E8B84A;
      --sunshine-light: #F5D680;
      --sunshine-pale: #FEF6DC;
      --plum: #6B3D7A;
      --plum-light: #9B6DAA;
      --plum-pale: #F0E8F5;
      --plum-deep: #3D1F50;
      --burgundy: #8B2252;
      --burgundy-light: #B85080;
      --text: #2A1A35;
      --text-muted: #7A6080;
      --border: rgba(107, 61, 122, 0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.25rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 253, 248, 0.93);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--plum-deep);
      text-decoration: none;
    }

    .nav-back {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .nav-back:hover { color: var(--plum); }

    .teardown-hero {
      padding: 8rem 4rem 4rem;
      max-width: 900px;
      margin: 0 auto;
      animation: fadeUp 0.8s ease forwards;
    }

    .breadcrumb {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--burgundy);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .breadcrumb::before { content: ''; width: 1.2rem; height: 1px; background: var(--burgundy-light); }
    .breadcrumb span { color: var(--text-muted); }

    .teardown-day {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--burgundy);
      margin-bottom: 1rem;
    }

    .teardown-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 6vw, 5rem);
      font-weight: 300;
      color: var(--text);
      line-height: 1.05;
      margin-bottom: 1rem;
    }

    .teardown-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-style: italic;
      color: var(--plum-light);
      margin-bottom: 2rem;
    }

    .teardown-meta {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 3rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }

    .meta-item { display: flex; flex-direction: column; gap: 0.3rem; }

    .meta-label {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .meta-value { font-size: 0.875rem; color: var(--text); }

    .teardown-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 4rem 6rem;
    }

    .section { margin-bottom: 3.5rem; }

    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--burgundy);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-label::before { content: ''; width: 1.2rem; height: 1px; background: var(--burgundy-light); }

    .section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .section p {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .section p:last-child { margin-bottom: 0; }

    .stakeholder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .stakeholder-card {
      background: var(--sunshine-pale);
      border: 1px solid rgba(232, 184, 74, 0.3);
      padding: 1.5rem;
    }

    .stakeholder-card h3 {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--burgundy);
      margin-bottom: 1rem;
    }

    .stakeholder-card ul { list-style: none; }

    .stakeholder-card ul li {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.7;
      padding: 0.4rem 0 0.4rem 1rem;
      border-bottom: 1px solid rgba(232, 184, 74, 0.2);
      position: relative;
    }

    .stakeholder-card ul li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--plum-light);
      font-size: 0.7rem;
    }

    .stakeholder-card ul li:last-child { border-bottom: none; }

    .questions-list {
      list-style: none;
      margin-top: 1rem;
      counter-reset: questions;
    }

    .questions-list li {
      counter-increment: questions;
      padding: 1rem 0 1rem 3rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.7;
      position: relative;
    }

    .questions-list li::before {
      content: counter(questions, decimal-leading-zero);
      position: absolute;
      left: 0;
      color: var(--plum-light);
      font-size: 0.8rem;
      font-weight: 500;
      top: 1rem;
    }

    .recommendation-box {
      background: var(--plum-pale);
      border-left: 3px solid var(--plum);
      padding: 2rem 2.5rem;
      margin-top: 1.5rem;
    }

    .recommendation-box p {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .recommendation-box p:last-child { margin-bottom: 0; }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .metric-card {
      background: var(--sunshine-pale);
      border: 1px solid rgba(232, 184, 74, 0.3);
      padding: 1.5rem;
    }

    .metric-card h3 {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--burgundy);
      margin-bottom: 1rem;
    }

    .metric-card ul { list-style: none; }

    .metric-card ul li {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.7;
      padding: 0.4rem 0 0.4rem 1rem;
      border-bottom: 1px solid rgba(232, 184, 74, 0.2);
      position: relative;
    }

    .metric-card ul li::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--plum-light);
      font-size: 0.55rem;
      top: 0.65rem;
    }

    .metric-card ul li:last-child { border-bottom: none; }

    .rollout-list { list-style: none; margin-top: 1.5rem; }

    .rollout-item {
      display: grid;
      grid-template-columns: 3rem 1fr;
      gap: 1.5rem;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .rollout-item:last-child { border-bottom: none; }

    .rollout-phase {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--plum-light);
      line-height: 1;
    }

    .rollout-content h3 {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--plum-deep);
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }

    .rollout-content p {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 0;
    }

    .rating-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    .rating-table tr { border-bottom: 1px solid var(--border); }
    .rating-table td { padding: 1rem 0; font-size: 0.9rem; }
    .rating-table td:first-child { color: var(--text-muted); width: 50%; }
    .rating-table td:last-child { color: var(--sunshine); letter-spacing: 0.1em; }

    .takeaway-box {
      background: var(--plum-pale);
      border: 1px solid var(--border);
      border-left: 4px solid var(--plum);
      padding: 2.5rem;
      margin-top: 1.5rem;
      text-align: center;
    }

    .takeaway-box p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-style: italic;
      color: var(--plum-deep);
      line-height: 1.6;
    }

    .next-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      margin-top: 4rem;
    }

    .next-section a {
      text-decoration: none;
      color: var(--plum);
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: opacity 0.3s;
    }

    .next-section a:hover { opacity: 0.65; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 3rem 0;
    }

    .loading {
      padding: 6rem 4rem;
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      nav { padding: 1.25rem 2rem; }
      .teardown-hero { padding: 7rem 2rem 3rem; }
      .teardown-content { padding: 0 2rem 4rem; }
      .stakeholder-grid, .metrics-grid { grid-template-columns: 1fr; }
      .rollout-item { grid-template-columns: 2.5rem 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Komal Sikka</a>
    <a href="/#how-i-ai" class="nav-back">← Back to How I AI</a>
  </nav>

  <div id="page-content">
    <div class="loading">Loading teardown...</div>
  </div>

  <script>
    // Detect which JSON to load based on filename
    const page = location.pathname.split('/').pop().replace('.html', '');
    const jsonFile = `/teardowns/${page}.json`;

    fetch(jsonFile)
      .then(res => res.json())
      .then(d => {
        // Update page title
        document.title = `Day ${d.day} — ${d.tool} | Komal Unpacks`;

        // Build stakeholder cards
        const stakeholderCards = d.sections.problems.stakeholders.map(s => `
          <div class="stakeholder-card">
            <h3>${s.name}</h3>
            <ul>${s.points.map(p => `<li>${p}</li>`).join('')}</ul>
          </div>
        `).join('');

        // Build questions list
        const questionItems = d.sections.questions.items.map(q => `<li>${q}</li>`).join('');

        // Build recommendation paragraphs
        const recParas = d.sections.recommendation.paragraphs.map(p => `<p>${p}</p>`).join('');

        // Build metrics cards
        const metricCards = d.sections.metrics.categories.map(c => `
          <div class="metric-card">
            <h3>${c.name}</h3>
            <ul>${c.points.map(p => `<li>${p}</li>`).join('')}</ul>
          </div>
        `).join('');

        // Build rollout phases
        const rolloutItems = d.sections.rollout.phases.map(p => `
          <div class="rollout-item">
            <div class="rollout-phase">${p.number}</div>
            <div class="rollout-content">
              <h3>${p.title}</h3>
              <p>${p.description}</p>
            </div>
          </div>
        `).join('');

        // Build rating rows
        const ratingRows = d.sections.rating.scores.map(r => `
          <tr><td>${r.label}</td><td>${r.score}</td></tr>
        `).join('');

        // Build purpose paragraphs
        const purposeParas = d.sections.purpose.paragraphs.map(p => `<p>${p}</p>`).join('');

        // Render full page
        document.getElementById('page-content').innerHTML = `
          <div class="teardown-hero">
            <p class="breadcrumb">How I AI <span>·</span> Teardown</p>
            <p class="teardown-day">✦ Day ${d.day}</p>
            <h1 class="teardown-title">${d.tool}</h1>
            <p class="teardown-subtitle">${d.subtitle}</p>
            <div class="teardown-meta">
              <div class="meta-item">
                <span class="meta-label">Category</span>
                <span class="meta-value">${d.category}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">By</span>
                <span class="meta-value">${d.author}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Date</span>
                <span class="meta-value">${d.date}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Published at</span>
                <span class="meta-value">${d.published}</span>
              </div>
            </div>
          </div>

          <div class="teardown-content">

            <div class="section">
              <p class="section-label">01 — Purpose</p>
              <h2>${d.sections.purpose.heading}</h2>
              ${purposeParas}
            </div>

            <div class="divider"></div>

            <div class="section">
              <p class="section-label">02 — Problems</p>
              <h2>${d.sections.problems.heading}</h2>
              <p>${d.sections.problems.intro}</p>
              <div class="stakeholder-grid">${stakeholderCards}</div>
            </div>

            <div class="divider"></div>

            <div class="section">
              <p class="section-label">03 — Questions to Ask</p>
              <h2>${d.sections.questions.heading}</h2>
              <p>${d.sections.questions.intro}</p>
              <ol class="questions-list">${questionItems}</ol>
            </div>

            <div class="divider"></div>

            <div class="section">
              <p class="section-label">04 — My Recommendation</p>
              <h2>${d.sections.recommendation.heading}</h2>
              <div class="recommendation-box">${recParas}</div>
            </div>

            <div class="divider"></div>

            <div class="section">
              <p class="section-label">05 — Metrics</p>
              <h2>${d.sections.metrics.heading}</h2>
              <p>${d.sections.metrics.intro}</p>
              <div class="metrics-grid">${metricCards}</div>
            </div>

            <div class="divider"></div>

            <div class="section">
              <p class="section-label">06 — Roll-out Plan</p>
              <h2>${d.sections.rollout.heading}</h2>
              <div class="rollout-list">${rolloutItems}</div>
            </div>

            <div class="divider"></div>

            <div class="section">
              <p class="section-label">07 — Scorecard</p>
              <h2>${d.sections.rating.heading}</h2>
              <table class="rating-table">${ratingRows}</table>
            </div>

            <div class="divider"></div>

            <div class="section">
              <p class="section-label">08 — Bottom Line</p>
              <h2>${d.sections.takeaway.heading}</h2>
              <div class="takeaway-box"><p>${d.sections.takeaway.text}</p></div>
            </div>

            <div class="next-section">
              <a href="/">← Back to Portfolio</a>
              ${d.next ? `<a href="${d.next.link}">${d.next.label} →</a>` : ''}
            </div>

          </div>
        `;
      })
      .catch(() => {
        document.getElementById('page-content').innerHTML =
          '<div class="loading">Teardown not found. Please check back soon.</div>';
      });
  </script>

</body>
</html>
